<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Simple</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculadora{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:250px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:8px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    margin:5px 0;
    cursor:pointer;
}

.resultado{
    margin-top:10px;
    font-weight:bold;
    text-align:center;
}

</style>

</head>

<body>

<div class="calculadora">

<h2>Calculadora</h2>

<input type="number" id="num1" placeholder="Número 1">
<input type="number" id="num2" placeholder="Número 2">

<button onclick="sumar()">Sumar</button>
<button onclick="restar()">Restar</button>
<button onclick="multiplicar()">Multiplicar</button>
<button onclick="dividir()">Dividir</button>

<div class="resultado" id="resultado"></div>

</div>


<script>

function obtenerValores(){

let a = parseFloat(document.getElementById("num1").value);
let b = parseFloat(document.getElementById("num2").value);

if(isNaN(a) || isNaN(b)){
    mostrar("Ingresa ambos números");
    return null;
}

return {a,b};
}

function mostrar(texto){
document.getElementById("resultado").innerText = texto;
}

function sumar(){

let valores = obtenerValores();
if(!valores) return;

let resultado = valores.a + valores.b;

mostrar("Resultado: " + resultado);

}

function restar(){

let valores = obtenerValores();
if(!valores) return;

let resultado = valores.a - valores.b;

mostrar("Resultado: " + resultado);

}

function multiplicar(){

let valores = obtenerValores();
if(!valores) return;

let resultado = valores.a * valores.b;

mostrar("Resultado: " + resultado);

}

function dividir(){

let valores = obtenerValores();
if(!valores) return;

if(valores.b === 0){
    mostrar("Error: no se puede dividir entre 0");
    return;
}

let resultado = valores.a / valores.b;

mostrar("Resultado: " + resultado);

}

</script>

</body>
</html>
